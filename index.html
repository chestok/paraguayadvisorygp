<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paraguay Advisory Group by Oviedo Medina Group</title>
  <link rel="icon" href="logos/Sin título-5-03.png">
  <meta name="description" content="Más de 25 años de experiencia en servicios legales. Derecho corporativo, laboral, penal, civil, tributario e inmobiliario." />
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="app.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="stylesheet" href="estilos.css">
</head>
<body class="font-sans text-foreground antialiased">

  <div x-data="lawFirmApp()" x-init="init()" x-effect="$nextTick(() => refreshIcons())" class="relative min-h-screen overflow-hidden">
    <div class="pointer-events-none absolute inset-0 bg-mesh opacity-80"></div>

    <header 
      id="header" 
      class="fixed top-0 left-0 w-full z-50 transition-all duration-300 ease-in-out"
      :class="{
        'bg-transparent border-transparent': currentPage === 'home' && !scrolled,
        'bg-background/95 backdrop-blur-md border-b border-white/10 shadow-lg': currentPage !== 'home' || scrolled
      }"
      @scroll.window="scrolled = (window.pageYOffset > 50)"
      x-data="{ scrolled: false }"
    >
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-4 sm:px-6 lg:h-20 lg:px-8">
        <button @click="showPage('home')" class="relative flex items-center justify-start">
          <img src="logos/Sin título-5_Mesa de trabajo 1.png" alt="Paraguay Advisory Group" class="h-12 w-auto max-w-[220px] object-contain sm:h-24 sm:max-w-[260px]" />
        </button>

        <div class="hidden items-center gap-8 lg:flex">
          <template x-for="page in pages" :key="page">
            <button
              @click="showPage(page)"
              class="relative py-2 text-sm font-medium transition-colors"
              :class="currentPage === page ? 'text-primary' : 'text-muted-foreground hover:text-white'"
            >
              <span x-text="t.nav[page]"></span>
              <span x-show="currentPage === page" class="absolute bottom-0 left-0 right-0 h-0.5 bg-primary" x-cloak></span>
            </button>
          </template>
        </div>

        <div class="flex items-center gap-3">
          <div class="hidden rounded-xl bg-secondary p-1 md:flex">
            <template x-for="lang in ['es','en','pt']" :key="lang">
              <button
                @click="changeLanguage(lang)"
                class="rounded-lg px-3 py-1.5 text-xs font-semibold uppercase tracking-[0.22em] transition-all"
                :class="language === lang ? 'bg-primary text-primary-foreground' : 'text-muted-foreground hover:text-white'"
                x-text="lang"
              ></button>
            </template>
          </div>

          <button @click="mobileMenuOpen = !mobileMenuOpen" class="inline-flex items-center justify-center rounded-lg p-2 text-white transition hover:bg-secondary lg:hidden" aria-label="Abrir menú">
            <i :data-lucide="mobileMenuOpen ? 'x' : 'menu'" class="h-6 w-6"></i>
          </button>
        </div>
      </nav>

      <div x-show="mobileMenuOpen" x-transition.opacity.duration.250ms x-cloak class="border-t border-white/10 px-4 py-4 lg:hidden">
        <div class="space-y-2">
          <template x-for="page in pages" :key="`mobile-${page}`">
            <button
              @click="showPage(page)"
              class="block w-full rounded-xl px-4 py-3 text-left transition"
              :class="currentPage === page ? 'bg-primary text-primary-foreground' : 'bg-transparent text-white/85 hover:bg-secondary'"
              x-text="t.nav[page]"
            ></button>
          </template>
        </div>
        <div class="mt-4 flex rounded-xl bg-secondary p-1">
          <template x-for="lang in ['es','en','pt']" :key="`mobile-${lang}`">
            <button
              @click="changeLanguage(lang)"
              class="flex-1 rounded-lg px-3 py-2 text-xs font-semibold uppercase tracking-[0.22em] transition-all"
              :class="language === lang ? 'bg-primary text-primary-foreground' : 'text-muted-foreground'"
              x-text="lang"
            ></button>
          </template>
        </div>
      </div>
    </header>

    <main class="relative z-10 transition-all duration-300 ease-out" :class="isTransitioning ? 'opacity-0 translate-y-4' : 'opacity-100 translate-y-0'">
      
      <section x-show="currentPage === 'home'" x-cloak class="page-shell">
        <div class="relative min-h-screen w-full overflow-hidden bg-secondary bg-[radial-gradient(circle_at_top,rgba(212,175,55,0.05),transparent_25%)] flex items-center">  
          
          <div class="relative z-10 mx-auto w-full max-w-7xl px-4 py-20 sm:px-6 lg:px-8">
            
            <div class="grid items-center gap-12 lg:grid-cols-2 lg:gap-16">
              
              <div class="max-w-xl">
                <p class="mb-5 text-sm uppercase tracking-[0.34em] text-primary">
                  Paraguay Advisory Group
                </p>

                <h1 class="font-serif text-5xl leading-tight text-white sm:text-6xl lg:text-7xl"
                    x-text="t.firm.title"></h1>
                
                <p class="mt-2 text-xl font-medium text-primary" 
                   x-text="t.firm.subtitle"></p>

                <p class="mt-6 text-lg leading-8 text-muted-foreground"
                   x-text="t.firm.description"></p>

                <div class="mt-10 flex flex-col gap-4 sm:flex-row">
                  <button
                    @click="showPage('contact')"
                    class="group inline-flex items-center justify-center gap-2 rounded-lg bg-primary px-8 py-4 font-medium text-primary-foreground transition-all duration-300 hover:gap-4 hover:shadow-gold"
                  >
                    <span x-text="t.home.cta"></span>
                    <i data-lucide="arrow-right" class="h-5 w-5"></i>
                  </button>

                  <button
                    @click="showPage('services')"
                    class="group inline-flex items-center justify-center gap-2 rounded-lg border border-white/10 bg-white/5 px-8 py-4 font-medium text-white transition-all duration-300 hover:border-primary/40 hover:bg-secondary"
                  >
                    <span x-text="t.nav.services"></span>
                    <i data-lucide="chevron-right" class="h-5 w-5"></i>
                  </button>
                </div>
              </div>

              <div class="relative group mx-auto w-full max-w-md lg:max-w-none">
                <div class="absolute -inset-2 rounded-xl border border-primary/20 transition-all duration-500 group-hover:-inset-3 group-hover:border-primary/50"></div>
                
                <div class="gold-frame relative overflow-hidden rounded-xl bg-card shadow-premium">
                  <img
                    src="./imagenes/EmiliaAlejandro.jpg"
                    alt="Emilia Oviedo y Alejandro Penayo"
                    class="h-[500px] lg:h-[580px] w-full object-cover object-top transition-transform duration-700 ease-out group-hover:scale-105"
                  />
                  <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
                </div>
              </div>

            </div>

          </div>
        </div>

        <div class="bg-card py-10 lg:py-14">
          <div class="mx-auto grid max-w-7xl gap-6 px-4 sm:px-6 lg:grid-cols-2 lg:items-center lg:gap-10 lg:px-8">
            <div class="relative group">
              <div class="absolute -inset-2 rounded-sm border border-primary/40 transition-all duration-500 group-hover:-inset-3 group-hover:border-primary/70 lg:-inset-4 lg:group-hover:-inset-5"></div>
              <div class="relative overflow-hidden rounded-sm">
                <img src="./imagenes/law-firm.jpg" alt="Legal expertise" class="h-[300px] w-full object-cover transition-transform duration-700 group-hover:scale-105 lg:h-[400px]" />
                <div class="absolute inset-0 bg-gradient-to-t from-background/55 via-transparent to-transparent"></div>
                <div class="absolute inset-x-0 bottom-0 p-8">
                  <p class="text-xs uppercase tracking-[0.32em] text-primary">Legal expertise</p>
                  <h2 class="mt-4 font-serif text-4xl text-white">Premium counsel in Paraguay</h2>
                </div>
                <div class="absolute inset-0 bg-primary/10 opacity-0 transition-opacity duration-500 group-hover:opacity-100"></div>
              </div>
            </div>
            <div class="lg:pl-8">
              <h2 class="font-serif text-4xl italic leading-tight text-white sm:text-5xl lg:text-6xl">
                <span class="text-primary" x-text="t.home.experience.years"></span>
                <span x-text="` ${t.home.experience.title}`"></span>
              </h2>
              <p class="mt-6 text-lg leading-8 text-muted-foreground" x-text="t.home.experience.description"></p>
              <button @click="window.open('./nuevo/index.html', '_blank')" class="mt-8 inline-flex items-center justify-center gap-2 bg-primary px-8 py-4 text-sm font-medium uppercase tracking-[0.24em] text-primary-foreground transition-all duration-300 hover:gap-4 hover:px-10" x-text="t.home.experience.cta"></button>
            </div>
          </div>
        </div>

        <div class="border-y border-white/10 bg-background py-16">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="grid items-center gap-8 lg:grid-cols-[1.2fr_0.8fr]">
              <div>
                <p class="text-sm leading-8 whitespace-pre-line text-muted-foreground" x-text="t.home.partnerText"></p>
              </div>
              <div class="gold-frame rounded-[2rem] bg-card p-8 shadow-premium">
                <div class="flex min-h-[260px] flex-col items-center justify-center rounded-[1.5rem] border border-white/10 bg-white p-8 text-center">
                  <img src="./imagenes/oviedo-medina-logo.jpg" alt="Oviedo Medina Group" class="h-40 w-auto max-w-full object-contain" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="bg-card py-20 lg:py-32">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="grid gap-8 md:grid-cols-3">
              <template x-for="(feature, index) in t.home.features" :key="feature.title">
                <div class="group rounded-xl border border-white/10 bg-background p-8 transition-all duration-300 hover:-translate-y-2 hover:border-primary/50 hover:shadow-gold">
                  <div class="mb-6 flex h-12 w-12 items-center justify-center rounded-lg bg-primary/10 transition-all duration-300 group-hover:scale-110 group-hover:bg-primary">
                    <span class="text-2xl font-bold text-primary transition-colors duration-300 group-hover:text-primary-foreground" x-text="String(index + 1).padStart(2, '0')"></span>
                  </div>
                  <h3 class="mb-3 text-xl font-semibold transition-colors duration-300 group-hover:text-primary" x-text="feature.title"></h3>
                  <p class="leading-8 text-muted-foreground" x-text="feature.description"></p>
                </div>
              </template>
            </div>
          </div>
        </div>
      </section>

      <section x-show="currentPage === 'services'" x-cloak class="page-shell bg-card">
        <div class="mx-auto max-w-7xl px-4 py-20 sm:px-6 lg:px-8 lg:py-32">
          <div class="mx-auto mb-16 max-w-2xl text-center">
            <h2 class="font-serif text-4xl text-white sm:text-5xl" x-text="t.services.title"></h2>
            <p class="mt-4 text-lg text-muted-foreground" x-text="t.services.subtitle"></p>
          </div>
          <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <template x-for="service in t.services.list" :key="service.title">
              <div class="group relative overflow-hidden rounded-xl border border-white/10 bg-background p-8 transition-all duration-500 hover:-translate-y-2 hover:border-primary/50 hover:shadow-gold">
                <div class="absolute right-0 top-0 h-32 w-32 rounded-bl-full bg-primary/5 transition-all duration-500 group-hover:h-48 group-hover:w-48 group-hover:bg-primary/10"></div>
                <div class="relative">
                  <div class="mb-6 flex h-14 w-14 items-center justify-center rounded-xl bg-primary/10 transition-all duration-300 group-hover:scale-110 group-hover:bg-primary">
                    <i :data-lucide="service.icon" class="h-7 w-7 text-primary transition-colors duration-300 group-hover:text-primary-foreground"></i>
                  </div>
                  <h3 class="mb-3 text-xl font-semibold transition-colors duration-300 group-hover:text-primary" x-text="service.title"></h3>
                  <p class="leading-8 text-muted-foreground" x-text="service.description"></p>
                </div>
              </div>
            </template>
          </div>
        </div>
      </section>

      <section x-show="currentPage === 'firm'" x-cloak class="page-shell">
        <div class="bg-[radial-gradient(ellipse_at_bottom_left,rgba(212,175,55,0.12),transparent_45%),linear-gradient(180deg,#0a0a0a_0%,#131313_100%)] py-20 lg:py-32">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            
            <div class="max-w-4xl mx-auto text-left">
              <p class="mb-4 text-sm uppercase tracking-[0.34em] text-primary">Nuestra Filosofía</p>
              <h2 class="font-serif text-4xl text-white sm:text-5xl" x-text="t.home.title"></h2>
              <p class="mt-8 text-lg leading-8 text-muted-foreground" x-text="t.home.subtitle"></p>
            </div>

          </div>
        </div>

        <div class="bg-card py-20">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
              <template x-for="(value, index) in t.firm.values" :key="value.title">
                <div class="group rounded-xl border border-white/10 bg-background p-6 transition-all duration-300 hover:-translate-y-1 hover:border-primary/50 hover:shadow-gold">
                  <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-primary/10 transition-all duration-300 group-hover:scale-110 group-hover:bg-primary">
                    <span class="text-lg font-bold text-primary transition-colors duration-300 group-hover:text-primary-foreground" x-text="String(index + 1).padStart(2, '0')"></span>
                  </div>
                  <h3 class="mb-2 text-lg font-semibold transition-colors duration-300 group-hover:text-primary" x-text="value.title"></h3>
                  <p class="text-sm leading-7 text-muted-foreground" x-text="value.description"></p>
                </div>
              </template>
            </div>
          </div>
        </div>

        <div class="py-20 lg:py-32">
          <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="grid gap-8 md:grid-cols-2 justify-center max-w-4xl mx-auto">
              <template x-for="member in t.firm.team" :key="member.name">
                <div class="group rounded-xl border border-white/10 bg-card p-8 text-center transition-all duration-300 hover:-translate-y-2 hover:border-primary/50 hover:shadow-gold">
                  <div class="mx-auto mb-6 flex h-28 w-28 items-center justify-center overflow-hidden rounded-full border-2 border-white/10 bg-[linear-gradient(135deg,#1a1a1a,#2a2a2a)] text-3xl font-serif text-primary transition-all duration-300 group-hover:scale-105 group-hover:border-primary">
                    <img 
                      :src="member.image || './imagenes/team-placeholder.jpg'" 
                      alt="Director"
                      class="h-full w-full object-cover"
                    />
                  </div>
                  <h3 class="text-xl font-semibold transition-colors duration-300 group-hover:text-primary" x-text="member.name"></h3>
                  <p class="mt-1 font-medium text-primary" x-text="member.role"></p>
                  <p class="mt-3 text-sm leading-7 text-muted-foreground" x-text="member.description"></p>
                </div>
              </template>
            </div>
          </div>
        </div>
      </section>

      <section x-show="currentPage === 'blog'" x-cloak class="page-shell bg-card">
        <div class="mx-auto max-w-7xl px-4 py-20 sm:px-6 lg:px-8 lg:py-32">
          <div class="mx-auto mb-16 max-w-2xl text-center">
            <h2 class="font-serif text-4xl text-white sm:text-5xl" x-text="t.blog.title"></h2>
            <p class="mt-4 text-lg text-muted-foreground" x-text="t.blog.subtitle"></p>
          </div>
          <div class="grid gap-8 md:grid-cols-3">
            <template x-for="article in t.blog.articles" :key="article.title">
              <a :href="article.link" target="_blank" rel="noopener noreferrer" class="block h-full">
                <article class="group h-full cursor-pointer overflow-hidden rounded-xl border border-white/10 bg-background transition-all duration-300 hover:-translate-y-1 hover:border-primary/50">
                  <div class="h-48 overflow-hidden bg-primary/10">
                    <img :src="article.image" alt="" class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105">
                  </div>
                  <div class="p-6">
                    <div class="mb-3 flex items-center gap-3">
                      <span class="rounded-full bg-primary/10 px-3 py-1 text-xs font-medium text-primary" x-text="article.category"></span>
                      <span class="text-xs text-muted-foreground" x-text="article.date"></span>
                    </div>
                    <h3 class="text-lg font-semibold transition-colors duration-300 group-hover:text-primary" x-text="article.title"></h3>
                    <p class="mt-2 line-clamp-3 text-sm leading-7 text-muted-foreground" x-text="article.excerpt"></p>
                  </div>
                </article>
              </a>
            </template>
          </div>
        </div>
      </section>

      <section x-show="currentPage === 'contact'" x-cloak class="page-shell">
        <div class="mx-auto max-w-7xl px-4 py-20 sm:px-6 lg:px-8 lg:py-32">
          <div class="mx-auto mb-16 max-w-2xl text-center">
            <h2 class="font-serif text-4xl text-white sm:text-5xl" x-text="t.contact.title"></h2>
            <p class="mt-4 text-lg text-muted-foreground" x-text="t.contact.subtitle"></p>
          </div>
          <div class="grid gap-12 lg:grid-cols-2 lg:gap-20">
            <div class="rounded-xl border border-white/10 bg-card p-8">
              <template x-if="contactStatus === 'SUCCESS'">
                <div class="py-12 text-center">
                  <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-full bg-primary/10">
                    <i data-lucide="shield" class="h-8 w-8 text-primary"></i>
                  </div>
                  <h3 class="mb-2 text-2xl font-bold text-white" x-text="t.contact.successTitle"></h3>
                  <p class="mb-8 text-muted-foreground" x-text="t.contact.successMessage"></p>
                  <button @click="contactStatus = 'IDLE'" class="font-medium text-primary hover:underline" x-text="t.contact.successReset"></button>
                </div>
              </template>

              <template x-if="contactStatus !== 'SUCCESS'">
                <form @submit.prevent="submitContact" class="space-y-6">
                  <input type="hidden" name="_subject" value="Nuevo mensaje desde la web" />
                  <div>
                    <label class="mb-2 block text-sm font-medium" x-text="t.contact.form.name"></label>
                    <input x-model="contactForm.nombre" type="text" name="nombre" required class="w-full rounded-lg border border-white/10 bg-background px-4 py-3 text-white transition-all focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30" />
                  </div>
                  <div class="grid gap-6 sm:grid-cols-2">
                    <div>
                      <label class="mb-2 block text-sm font-medium" x-text="t.contact.form.email"></label>
                      <input x-model="contactForm.email" type="email" name="email" required class="w-full rounded-lg border border-white/10 bg-background px-4 py-3 text-white transition-all focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                    <div>
                      <label class="mb-2 block text-sm font-medium" x-text="t.contact.form.phone"></label>
                      <input x-model="contactForm.telefono" type="tel" name="telefono" class="w-full rounded-lg border border-white/10 bg-background px-4 py-3 text-white transition-all focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30" />
                    </div>
                  </div>
                  <div>
                    <label class="mb-2 block text-sm font-medium" x-text="t.contact.form.message"></label>
                    <textarea x-model="contactForm.mensaje" name="mensaje" rows="5" required class="w-full resize-none rounded-lg border border-white/10 bg-background px-4 py-3 text-white transition-all focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/30"></textarea>
                  </div>
                  <button type="submit" :disabled="contactStatus === 'SENDING'" class="inline-flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-8 py-4 font-medium text-primary-foreground transition-all hover:bg-[#c9a52f] disabled:opacity-50">
                    <span x-text="contactStatus === 'SENDING' ? t.contact.sending : t.contact.form.submit"></span>
                    <i data-lucide="arrow-right" class="h-5 w-5"></i>
                  </button>
                  <p x-show="contactStatus === 'ERROR'" x-cloak class="mt-2 text-center text-sm text-red-400" x-text="t.contact.error"></p>
                </form>
              </template>
            </div>

            <div class="space-y-8">
              <div class="flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10">
                  <i data-lucide="map-pin" class="h-6 w-6 text-primary"></i>
                </div>
                <div>
                  <h3 class="mb-1 font-semibold text-white" x-text="t.contact.labels.address"></h3>
                  <p class="text-muted-foreground" x-text="t.contact.info.address"></p>
                </div>
              </div>
              <div class="flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10">
                  <i data-lucide="phone" class="h-6 w-6 text-primary"></i>
                </div>
                <div>
                  <h3 class="mb-1 font-semibold text-white" x-text="t.contact.labels.phone"></h3>
                  <p class="text-muted-foreground" x-text="t.contact.info.phone"></p>
                </div>
              </div>
              <div class="flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10">
                  <i data-lucide="mail" class="h-6 w-6 text-primary"></i>
                </div>
                <div>
                  <h3 class="mb-1 font-semibold text-white" x-text="t.contact.labels.email"></h3>
                  <p class="text-muted-foreground" x-text="t.contact.info.email"></p>
                </div>
              </div>
              <div class="flex items-start gap-4">
                <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-primary/10">
                  <i data-lucide="clock-3" class="h-6 w-6 text-primary"></i>
                </div>
                <div>
                  <h3 class="mb-1 font-semibold text-white" x-text="t.contact.labels.hours"></h3>
                  <p class="text-muted-foreground" x-text="t.contact.info.hours"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="relative z-10 mt-auto border-t border-white/10 bg-card">
      <div class="mx-auto max-w-7xl px-4 py-12 sm:px-6 lg:px-8 lg:py-16">
        <div class="grid gap-10 md:grid-cols-2 lg:grid-cols-4 lg:gap-8">
          <div>
            <div class="mb-4 flex items-center gap-3">
